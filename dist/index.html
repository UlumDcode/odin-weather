<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Odin Weather</title><script defer="defer" src="main.js"></script></head><body><header><h1>Odin Weather App</h1></header><main><section id="search-section"><form id="search-form"><input id="search-input" placeholder="City" required/> <button type="submit">Cari</button></form></section><div id="loading" class="hidden"><div class="spinner"></div><p>Memuat data cuaca ...</p></div><div id="error" class="hidden"><p id="error-message"></p></div><section id="current-weather" class="hidden"><h2 id="city-name"></h2><p id="date"></p><div class="weather-main"><img src="" alt="" id="weather-icon"/><p id="temperature"></p><p id="weather-description"></p></div><div class="weather-details"><div class="detail-item"><span class="detail-label">Feels Like : </span><span id="feels-like" class="detail-value"></span></div><div class="detail-item"><span class="detail-label">humidity : </span><span id="humidity" class="detail-value"></span></div><div class="detail-item"><span class="detail-label">Wind Speed : </span><span id="wind-speed" class="detail-value"></span></div></div></section><section id="forecast" class="hidden"><h2>6-days forecast</h2><div id="forecast-container"></div></section></main><footer><p>&copy; UlumDcode</p></footer></body></html>
